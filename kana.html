<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>가나 암기</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#6366f1">
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <a class="back" href="index.html">← 목록</a>
      <h1>가나 암기</h1>
    </div>
    <div class="score" id="score">0 / 0 · 정확도 —</div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="filters">
    <button class="chip" id="hard-mode" aria-pressed="false">어려운 단계</button>
    <button class="chip" id="weak-only" aria-pressed="false">약한 글자만</button>
    <button class="chip" id="picker-toggle">글자 고르기</button>
  </div>

  <div class="filters" id="stage-bar" hidden>
    <button class="chip stage" data-stage="0">1단계</button>
    <button class="chip stage" data-stage="1">2단계</button>
    <button class="chip stage" data-stage="2">3단계</button>
    <button class="chip stage" data-stage="top">최고 단계</button>
    <button class="mini" id="reshuffle" hidden>새로 섞기</button>
  </div>

  <div class="picker" id="picker" hidden>
    <div id="picker-groups"></div>
    <div class="picker-foot">
      <button class="mini" id="add-misses">틀린 글자 전부 추가</button>
      <button class="mini" id="clear-weak">전체 해제</button>
    </div>
  </div>

  <div class="card">
    <div class="kana jp" id="kana">…</div>
    <div class="timebar" id="timebar" hidden><div class="fill" id="timefill"></div></div>
    <div class="tag" id="tag">—</div>
  </div>

  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <div class="hint">숫자키 <b>1~5</b>로 선택 · <b>Space</b>로 다음 문제 · 틀린 글자를 누르면 약한 글자로 등록됩니다</div>

  <div class="review">
    <h2>틀린 글자</h2>
    <div class="misses" id="misses"><span class="empty">아직 없어요.</span></div>
  </div>
</div>

<script>
const KANA = [
  // 청음
  ...[["あ","a","아"],["い","i","이"],["う","u","우"],["え","e","에"],["お","o","오"],
      ["か","ka","카"],["き","ki","키"],["く","ku","쿠"],["け","ke","케"],["こ","ko","코"],
      ["さ","sa","사"],["し","shi","시"],["す","su","스"],["せ","se","세"],["そ","so","소"],
      ["た","ta","타"],["ち","chi","치"],["つ","tsu","츠"],["て","te","테"],["と","to","토"],
      ["な","na","나"],["に","ni","니"],["ぬ","nu","누"],["ね","ne","네"],["の","no","노"],
      ["は","ha","하"],["ひ","hi","히"],["ふ","fu","후"],["へ","he","헤"],["ほ","ho","호"],
      ["ま","ma","마"],["み","mi","미"],["む","mu","무"],["め","me","메"],["も","mo","모"],
      ["や","ya","야"],["ゆ","yu","유"],["よ","yo","요"],
      ["ら","ra","라"],["り","ri","리"],["る","ru","루"],["れ","re","레"],["ろ","ro","로"],
      ["わ","wa","와"],["を","wo","오"],["ん","n","응"]].map(x => mk(x, "청음")),
  // 탁음
  ...[["が","ga","가"],["ぎ","gi","기"],["ぐ","gu","구"],["げ","ge","게"],["ご","go","고"],
      ["ざ","za","자"],["じ","ji","지"],["ず","zu","즈"],["ぜ","ze","제"],["ぞ","zo","조"],
      ["だ","da","다"],["ぢ","ji","지"],["づ","zu","즈"],["で","de","데"],["ど","do","도"],
      ["ば","ba","바"],["び","bi","비"],["ぶ","bu","부"],["べ","be","베"],["ぼ","bo","보"]].map(x => mk(x, "탁음")),
  // 반탁음
  ...[["ぱ","pa","파"],["ぴ","pi","피"],["ぷ","pu","푸"],["ぺ","pe","페"],["ぽ","po","포"]].map(x => mk(x, "반탁음")),
  // 요음
  ...[["きゃ","kya","캬"],["きゅ","kyu","큐"],["きょ","kyo","쿄"],
      ["しゃ","sha","샤"],["しゅ","shu","슈"],["しょ","sho","쇼"],
      ["ちゃ","cha","차"],["ちゅ","chu","추"],["ちょ","cho","초"],
      ["にゃ","nya","냐"],["にゅ","nyu","뉴"],["にょ","nyo","뇨"],
      ["ひゃ","hya","햐"],["ひゅ","hyu","휴"],["ひょ","hyo","효"],
      ["みゃ","mya","먀"],["みゅ","myu","뮤"],["みょ","myo","묘"],
      ["りゃ","rya","랴"],["りゅ","ryu","류"],["りょ","ryo","료"],
      ["ぎゃ","gya","갸"],["ぎゅ","gyu","규"],["ぎょ","gyo","교"],
      ["じゃ","ja","자"],["じゅ","ju","주"],["じょ","jo","조"],
      ["びゃ","bya","뱌"],["びゅ","byu","뷰"],["びょ","byo","뵤"],
      ["ぴゃ","pya","퍄"],["ぴゅ","pyu","퓨"],["ぴょ","pyo","표"]].map(x => mk(x, "요음")),
];

// 자음 행(row)과 모음(vowel)을 로마자에서 뽑아둔다. 헷갈리는 보기를 고르는 데 쓴다.
function mk([kana, romaji, ko], type) {
  const vowel = romaji === "n" ? "n" : romaji.slice(-1);
  const row = romaji === "n" ? "n" : (romaji.replace(/[aiueo]+$/, "") || "vowel");
  return { kana, romaji, ko, type, row, vowel };
}

const TYPES = ["청음", "탁음", "반탁음", "요음"];
const enabled = new Set(TYPES);

const $ = id => document.getElementById(id);
const shuffle = a => a.map(v => [Math.random(), v]).sort((x, y) => x[0] - y[0]).map(x => x[1]);

// 어려운 단계 — 요음·탁음·반탁음 전부에, 자주 헷갈리는 청음 14자(라행 + け·は·ひ·ふ·き·う·て·ち·さ)를 더한 범위
const HARD_EXTRA = new Set(["ら", "り", "る", "れ", "ろ", "け", "は", "ひ", "ふ", "き", "う", "て", "ち", "さ"]);
const hardPool = () => KANA.filter(k => k.type !== "청음" || HARD_EXTRA.has(k.kana));
let hardMode = false;
try { hardMode = localStorage.getItem("kanaLevel") === "hard"; } catch {}

/*
 * 어려운 단계는 72자를 무작위로 24자씩 1·2·3단계로 나눠 진행한다.
 * 분할과 단계 완료 여부를 저장해 두므로, 1단계만 끝내고 앱을 껐다가 나중에 이어서 할 수 있다.
 * 문제마다 5초 제한이 있고, 5초 안에 정답을 고르지 못한 글자는 slow 목록에 쌓인다.
 * "최고 단계"는 그 목록만 출제하며, 목록에서 빠지는 길은 1~3단계에서 5초 내 정답뿐이다.
 */
const HS_KEY = "hardStages";
const SLOW_KEY = "slowKana";
const SEC_LIMIT = 5000;

function makeSplit() {
  const p = shuffle(hardPool().map(k => k.kana));
  return { split: [p.slice(0, 24), p.slice(24, 48), p.slice(48, 72)], done: [false, false, false] };
}

function loadStages() {
  // 저장된 분할이 현재 출제 범위와 정확히 같은 72자일 때만 신뢰한다 (범위를 고치면 자동으로 새로 섞임)
  const want = hardPool().map(k => k.kana).sort().join("");
  try {
    const v = JSON.parse(localStorage.getItem(HS_KEY));
    if (v && Array.isArray(v.split) && v.split.length === 3 && Array.isArray(v.done) &&
        v.split.every(s => Array.isArray(s)) && v.split.flat().sort().join("") === want)
      return { split: v.split, done: [0, 1, 2].map(i => !!v.done[i]) };
  } catch {}
  return makeSplit();
}

let hs = loadStages();
function saveStages() { try { localStorage.setItem(HS_KEY, JSON.stringify(hs)); } catch {} }
saveStages();   // 새로 섞였다면 바로 고정해 둔다 — 중간에 껐다 켜도 같은 분할이어야 하므로

let stage = null;       // 0·1·2 또는 "top", 어려운 단계가 꺼져 있으면 null
let stageQueue = [];    // 이번 단계에서 낼 글자들 (한 글자씩 한 번만)
let stagePos = 0;
let runFast = 0, runTotal = 0;   // 이번 단계 런의 5초 내 정답 통계

// 저장된 값은 남의 손을 탄 데이터로 취급한다. 배열이 아니거나 표에 없는 글자가 들어와도
// new Set(...)에서 터지거나 빈 목록으로 모드가 켜지지 않도록 여기서 걸러낸다.
function loadKanaList(key) {
  const known = new Set(KANA.map(k => k.kana));
  try {
    const raw = JSON.parse(localStorage.getItem(key));
    return Array.isArray(raw) ? raw.filter(x => known.has(x)) : [];
  } catch {
    return [];   // 사생활 보호 모드 등에서 접근이 막혀도 퀴즈는 돌아가야 한다
  }
}

// 약한 글자 — 사용자가 직접 고른 집중 연습 대상. 새로고침해도 남도록 저장한다.
const WEAK_KEY = "weakKana";
const weak = new Set(loadKanaList(WEAK_KEY));
let weakOnly = false;
function saveWeak() {
  try { localStorage.setItem(WEAK_KEY, JSON.stringify([...weak])); }
  catch { /* 저장 못 해도 이번 세션 동안은 동작한다 */ }
}

// 5초 안에 정답을 못 고른 글자들 — "최고 단계"의 출제 범위
const slow = new Set(loadKanaList(SLOW_KEY));
function saveSlow() { try { localStorage.setItem(SLOW_KEY, JSON.stringify([...slow])); } catch {} }

let current = null;
let locked = false;
let advanceTimer = null;   // 자동으로 다음 문제로 넘기는 타이머 (next()에서 반드시 취소한다)
let total = 0, hits = 0;
const misses = new Map(); // kana -> {entry, count}

function buildFilters() {
  $("filters").innerHTML = "";
  for (const t of TYPES) {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = t;
    b.setAttribute("aria-pressed", enabled.has(t));
    b.onclick = () => {
      if (enabled.has(t)) {
        if (enabled.size === 1) return; // 최소 한 종류는 켜둔다
        enabled.delete(t);
      } else {
        enabled.add(t);
      }
      b.setAttribute("aria-pressed", enabled.has(t));
      next();
    };
    $("filters").appendChild(b);
  }
}

function pool() {
  let base;
  if (weakOnly)       base = KANA.filter(k => weak.has(k.kana));
  else if (hardMode)  base = KANA.filter(k => k.type !== "청음" || HARD_EXTRA.has(k.kana));
  else                base = KANA.filter(k => enabled.has(k.type));
  return base.length ? base : KANA;   // 어떤 경우에도 빈 출제 범위로 떨어지지 않게
}

function makeChoices(answer) {
  // 같은 한글 발음(じ/ぢ, ず/づ, お/を 등)은 보기에서 제외 — 정답이 둘이 되면 안 된다
  const seen = new Set([answer.ko]);
  const uniq = [];
  for (const k of KANA) {
    if (seen.has(k.ko)) continue;
    seen.add(k.ko);
    uniq.push(k);
  }
  const similar = shuffle(uniq.filter(k => k.row === answer.row || k.vowel === answer.vowel));
  const rest = shuffle(uniq.filter(k => !similar.includes(k)));
  const picked = [...similar.slice(0, 3), ...rest].slice(0, 4);
  return shuffle([answer, ...picked]);
}

/* ── 5초 타이머 ─────────────────────────── */
let qStart = 0, overTimer = null;

function startTimer() {
  const bar = $("timebar"), fill = $("timefill");
  bar.hidden = false;
  bar.classList.remove("over");
  fill.style.transition = "none";
  fill.style.width = "100%";
  void fill.offsetWidth;                       // 강제 리플로 — 없으면 전환이 생략된다
  fill.style.transition = "width " + SEC_LIMIT + "ms linear";
  fill.style.width = "0%";
  qStart = Date.now();
  clearTimeout(overTimer);
  overTimer = setTimeout(() => bar.classList.add("over"), SEC_LIMIT);
}

function stopTimer(freeze) {
  clearTimeout(overTimer);
  const bar = $("timebar"), fill = $("timefill");
  if (freeze && !bar.hidden) {
    fill.style.width = getComputedStyle(fill).width;   // 답한 순간의 위치에서 멈춘다
    fill.style.transition = "none";
  } else if (!freeze) {
    bar.hidden = true;
  }
}

function renderChoices() {
  const box = $("choices");
  box.innerHTML = "";
  makeChoices(current).forEach((c, i) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = `<span class="num">${i + 1}</span><span>${c.ko}</span><span class="romaji">${c.romaji}</span>`;
    b.onclick = () => answer(c, b);
    b.dataset.ko = c.ko;
    box.appendChild(b);
  });
}

function next() {
  clearTimeout(advanceTimer);   // 이전 문제의 타이머가 살아 있으면 다음 문제를 곧장 넘겨버린다
  stopTimer(false);
  if (hardMode) { nextHard(); return; }

  const p = pool();
  current = p[Math.floor(Math.random() * p.length)];
  locked = false;
  $("kana").textContent = current.kana;
  $("tag").textContent = current.type;
  $("feedback").innerHTML = "";
  renderChoices();
}

/* ── 어려운 단계 진행 ────────────────────── */
const stageLabel = () => stage === "top" ? "최고 단계" : (stage + 1) + "단계";

function nextHard() {
  if (stage === null) {   // 세 단계를 모두 끝낸 채 들어온 상태
    renderStageDone("모든 단계 완료", "새로 섞기를 누르면 72자를 다시 24자씩 나눠 새 사이클을 시작합니다.");
    return;
  }
  if (stagePos >= stageQueue.length) {
    if (stage !== "top" && !hs.done[stage]) { hs.done[stage] = true; saveStages(); }
    renderStageDone(stageLabel() + " 완료",
      "5초 내 정답 " + runFast + "/" + runTotal + " · 최고 단계 대기 " + slow.size + "자");
    refresh();
    return;
  }
  current = stageQueue[stagePos];
  locked = false;
  $("kana").textContent = current.kana;
  $("tag").textContent = stageLabel() + " · " + (stagePos + 1) + "/" + stageQueue.length + " · " + current.type;
  $("feedback").innerHTML = "";
  renderChoices();
  startTimer();
}

function renderStageDone(title, detail) {
  locked = true;
  current = null;
  $("kana").textContent = "✓";
  $("tag").textContent = title;
  $("choices").innerHTML = "";
  $("feedback").textContent = detail;
  $("timebar").hidden = true;
}

function selectStage(i) {
  stage = i;
  const kanas = i === "top" ? [...slow] : hs.split[i];
  stageQueue = shuffle(kanas.map(k => BY_KANA.get(k)));
  stagePos = 0;
  runFast = 0;
  runTotal = 0;
  refresh();
  next();
}

// 어려운 단계에 들어오면 아직 안 끝낸 첫 단계부터 이어서 한다
function enterHard() {
  const i = hs.done.findIndex(d => !d);
  if (i === -1) { stage = null; refresh(); next(); }
  else selectStage(i);
}

function answer(choice, btn) {
  if (locked) return;
  locked = true;
  const elapsed = Date.now() - qStart;
  stopTimer(true);
  total++;

  const correct = choice.ko === current.ko;
  if (correct) hits++;
  else {
    const m = misses.get(current.kana) || { entry: current, count: 0 };
    m.count++;
    misses.set(current.kana, m);
  }

  // 5초 판정 — 최고 단계는 연습일 뿐, 목록에서 빼주는 건 1~3단계에서 5초 내 정답뿐이다
  let quick = correct;
  let extra = "";
  if (hardMode) {
    const fast = correct && elapsed <= SEC_LIMIT;
    const sec = " · " + (elapsed / 1000).toFixed(1) + "초";
    quick = fast;
    runTotal++;
    if (fast) runFast++;
    if (stage === "top") {
      extra = sec;
    } else if (fast) {
      extra = sec + (slow.has(current.kana) ? " · 최고 단계에서 제거!" : "");
      if (slow.delete(current.kana)) saveSlow();
    } else {
      extra = sec + " · ⏱ 최고 단계에 저장";
      slow.add(current.kana);
      saveSlow();
    }
    stagePos++;
  }

  for (const b of $("choices").children) {
    b.disabled = true;
    if (b.dataset.ko === current.ko) b.classList.add("correct");
    else if (b === btn) b.classList.add("wrong");
    else b.classList.add("dim");
  }

  $("feedback").innerHTML = (correct
    ? `<span class="hit">정답!</span> ${current.kana} = ${current.ko} (${current.romaji})`
    : `<span class="miss">아쉬워요.</span> ${current.kana} = ${current.ko} (${current.romaji})`) + extra;

  renderScore();
  refresh();
  advanceTimer = setTimeout(() => { if (locked) next(); }, quick ? 700 : 1600);
}

function renderScore() {
  const acc = total ? Math.round((hits / total) * 100) + "%" : "—";
  $("score").innerHTML = `<b>${hits}</b> / ${total} · 정확도 <b>${acc}</b>`;
}

function renderMisses() {
  const box = $("misses");
  if (!misses.size) { box.innerHTML = '<span class="empty">아직 없어요.</span>'; return; }
  box.innerHTML = "";
  for (const { entry, count } of [...misses.values()].sort((a, b) => b.count - a.count)) {
    // 틀린 글자를 눌러 바로 약한 글자로 등록/해제할 수 있게 한다
    const el = document.createElement("button");
    el.className = "miss-item";
    el.title = "눌러서 약한 글자로 등록";
    el.setAttribute("aria-pressed", weak.has(entry.kana));
    el.innerHTML = `<span class="k jp">${entry.kana}</span><span class="r">${entry.ko}</span>` +
      (count > 1 ? `<span class="c">×${count}</span>` : "") + `<span class="star">★</span>`;
    el.onclick = () => {
      if (weak.has(entry.kana)) weak.delete(entry.kana); else weak.add(entry.kana);
      saveWeak();
      refresh();
    };
    box.appendChild(el);
  }
}

/* ── 약한 글자 고르기 ───────────────────── */
/*
 * 오십음도 배치. 행(가로)과 단(세로)을 맞춰야 눈으로 훑기 쉬우므로 순서를 코드로 유도하지 않고
 * 표 그대로 적어 둔다. null 은 실제로 없는 칸(や행의 い·え 등)이고, 그 자리는 빈칸으로 비워 정렬을 지킨다.
 * 요음은 단이 ゃ·ゅ·ょ 셋뿐이라 열을 따로 잡는다.
 */
const PICKER_LAYOUT = [
  { type: "청음", cols: ["あ", "い", "う", "え", "お"], rows: [
    ["あ", ["あ", "い", "う", "え", "お"]],
    ["か", ["か", "き", "く", "け", "こ"]],
    ["さ", ["さ", "し", "す", "せ", "そ"]],
    ["た", ["た", "ち", "つ", "て", "と"]],
    ["な", ["な", "に", "ぬ", "ね", "の"]],
    ["は", ["は", "ひ", "ふ", "へ", "ほ"]],
    ["ま", ["ま", "み", "む", "め", "も"]],
    ["や", ["や", null, "ゆ", null, "よ"]],
    ["ら", ["ら", "り", "る", "れ", "ろ"]],
    ["わ", ["わ", null, null, null, "を"]],
    ["ん", ["ん", null, null, null, null]],
  ]},
  { type: "탁음", cols: ["あ", "い", "う", "え", "お"], rows: [
    ["が", ["が", "ぎ", "ぐ", "げ", "ご"]],
    ["ざ", ["ざ", "じ", "ず", "ぜ", "ぞ"]],
    ["だ", ["だ", "ぢ", "づ", "で", "ど"]],
    ["ば", ["ば", "び", "ぶ", "べ", "ぼ"]],
  ]},
  { type: "반탁음", cols: ["あ", "い", "う", "え", "お"], rows: [
    ["ぱ", ["ぱ", "ぴ", "ぷ", "ぺ", "ぽ"]],
  ]},
  { type: "요음", cols: ["ゃ", "ゅ", "ょ"], rows: [
    ["き", ["きゃ", "きゅ", "きょ"]],
    ["し", ["しゃ", "しゅ", "しょ"]],
    ["ち", ["ちゃ", "ちゅ", "ちょ"]],
    ["に", ["にゃ", "にゅ", "にょ"]],
    ["ひ", ["ひゃ", "ひゅ", "ひょ"]],
    ["み", ["みゃ", "みゅ", "みょ"]],
    ["り", ["りゃ", "りゅ", "りょ"]],
    ["ぎ", ["ぎゃ", "ぎゅ", "ぎょ"]],
    ["じ", ["じゃ", "じゅ", "じょ"]],
    ["び", ["びゃ", "びゅ", "びょ"]],
    ["ぴ", ["ぴゃ", "ぴゅ", "ぴょ"]],
  ]},
];

const BY_KANA = new Map(KANA.map(k => [k.kana, k]));

function buildPicker() {
  const host = $("picker-groups");
  host.innerHTML = "";

  const cellDiv = (cls, text) => {
    const el = document.createElement("div");
    el.className = cls;
    el.textContent = text;
    return el;
  };

  for (const { type, cols, rows } of PICKER_LAYOUT) {
    const group = document.createElement("div");
    group.className = "picker-group";
    const h = document.createElement("h3");
    h.textContent = type;
    group.appendChild(h);

    const table = document.createElement("div");
    table.className = "gyo-table";
    table.style.gridTemplateColumns = "26px repeat(" + cols.length + ", 1fr)";

    table.appendChild(cellDiv("col-head", ""));                 // 행 이름 열의 머리 — 비워 둔다
    for (const c of cols) table.appendChild(cellDiv("col-head", c));

    for (const [label, kanas] of rows) {
      table.appendChild(cellDiv("gyo-label jp", label));
      for (const kana of kanas) {
        if (!kana) { table.appendChild(cellDiv("gap", "")); continue; }
        const k = BY_KANA.get(kana);
        const cell = document.createElement("button");
        cell.className = "kana-cell";
        cell.setAttribute("aria-pressed", weak.has(k.kana));
        cell.innerHTML = '<span class="k jp"></span><span class="r"></span>';
        cell.children[0].textContent = k.kana;
        cell.children[1].textContent = k.ko;
        cell.onclick = () => {
          if (weak.has(k.kana)) weak.delete(k.kana); else weak.add(k.kana);
          saveWeak();
          refresh();
        };
        table.appendChild(cell);
      }
    }
    group.appendChild(table);
    host.appendChild(group);
  }
}

/*
 * weak / weakOnly / misses 를 비추는 UI는 세 군데(칩, 고르기 패널, 틀린 글자 목록)에 흩어져 있다.
 * 상태를 바꾼 곳마다 필요한 것만 골라 갱신하면 반드시 한 군데가 어긋나므로,
 * 바꾼 뒤에는 예외 없이 refresh() 하나만 부른다.
 */
function refresh() {
  if (weakOnly && !weak.size) weakOnly = false;   // 다 지우면 자동으로 전체 출제로 돌아간다

  const chip = $("weak-only");
  chip.textContent = weak.size ? "약한 글자만 (" + weak.size + ")" : "약한 글자만";
  chip.disabled = !weak.size;
  chip.setAttribute("aria-pressed", weakOnly);
  $("hard-mode").setAttribute("aria-pressed", hardMode);

  const lockTypes = weakOnly || hardMode;         // 두 모드 모두 종류 필터를 무시한다
  for (const b of $("filters").children) {
    b.disabled = lockTypes;
    b.style.opacity = lockTypes ? .4 : 1;
  }
  $("add-misses").disabled = !misses.size;

  for (const cell of $("picker-groups").querySelectorAll(".kana-cell")) {
    cell.setAttribute("aria-pressed", weak.has(cell.children[0].textContent));
  }
  renderStageBar();
  renderMisses();
}

function renderStageBar() {
  const bar = $("stage-bar");
  bar.hidden = !hardMode;
  if (!hardMode) return;
  for (const b of bar.querySelectorAll(".stage")) {
    const s = b.dataset.stage;
    if (s === "top") {
      b.textContent = "최고 단계 (" + slow.size + ")";
      b.disabled = !slow.size;
      b.setAttribute("aria-pressed", stage === "top");
    } else {
      b.textContent = (+s + 1) + "단계" + (hs.done[+s] ? " ✓" : "");
      b.setAttribute("aria-pressed", stage === +s);
    }
  }
  $("reshuffle").hidden = !hs.done.every(Boolean);
}

// 두 모드는 출제 범위를 서로 다르게 정의하므로 동시에 켤 수 없다 — 켜는 쪽이 이긴다
$("hard-mode").onclick = () => {
  hardMode = !hardMode;
  if (hardMode) weakOnly = false;
  try { localStorage.setItem("kanaLevel", hardMode ? "hard" : "all"); } catch {}
  if (hardMode) { enterHard(); return; }
  stage = null;
  refresh();
  next();
};

for (const b of document.querySelectorAll("#stage-bar .stage")) {
  b.onclick = () => selectStage(b.dataset.stage === "top" ? "top" : +b.dataset.stage);
}

$("reshuffle").onclick = () => {
  hs = makeSplit();
  saveStages();
  enterHard();
};

$("weak-only").onclick = () => {
  if (!weak.size) return;
  weakOnly = !weakOnly;
  if (weakOnly && hardMode) {
    hardMode = false;
    stage = null;
    try { localStorage.setItem("kanaLevel", "all"); } catch {}
  }
  refresh();
  next();
};

$("picker-toggle").onclick = () => {
  const p = $("picker");
  p.hidden = !p.hidden;
  $("picker-toggle").textContent = p.hidden ? "글자 고르기" : "고르기 닫기";
  if (p.hidden) next();   // 고르기를 끝내고 닫을 때 새 범위로 문제를 다시 낸다
};

$("add-misses").onclick = () => {
  for (const kana of misses.keys()) weak.add(kana);
  saveWeak();
  refresh();
};

$("clear-weak").onclick = () => {
  weak.clear();
  saveWeak();
  refresh();
  next();
};

document.addEventListener("keydown", e => {
  // 고르기 패널이 열려 있거나 버튼에 포커스가 있으면 단축키가 그쪽 조작을 가로채면 안 된다
  if (!$("picker").hidden) return;
  if (e.target.closest && e.target.closest(".kana-cell, .chip, .miss-item, .mini")) return;

  if (e.key >= "1" && e.key <= "5") {
    const b = $("choices").children[+e.key - 1];
    if (b && !b.disabled) b.click();
  } else if (e.code === "Space") {
    e.preventDefault();
    if (!hardMode) { next(); return; }
    if (locked) { locked = false; next(); }   // 단계 모드에선 답하기 전엔 건너뛸 수 없다
  }
});

buildFilters();
buildPicker();
refresh();
renderScore();
if (hardMode) enterHard(); else next();
</script>
</body>
</html>
