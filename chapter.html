<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>단어 퀴즈</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#3b6ef5">
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <a class="back" href="index.html">← 목록</a>
      <h1 id="title">…</h1>
    </div>
    <div class="score" id="score">0 / 0</div>
  </header>

  <div class="filters">
    <button class="chip" id="order-seq" aria-pressed="false">교재 순서</button>
    <button class="chip" id="order-shuffle" aria-pressed="true">섞기</button>
    <button class="chip" id="parts-toggle" aria-pressed="false">단어 설명</button>
  </div>

  <div id="quiz">
    <div class="card">
      <div class="word jp" id="word">…</div>
      <div class="tag" id="tag">—</div>
    </div>

    <div class="furi-bar">
      <button class="furi-btn" id="furi">히라가나 보기 (F)</button>
    </div>

    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div class="parts" id="parts" hidden></div>
    <div class="hint">숫자키 <b>1~5</b>로 선택 · <b>Space</b>로 다음</div>
  </div>

  <div id="done" hidden>
    <div class="card done">
      <div class="big">🎉</div>
      <div class="t">전부 맞혔어요</div>
      <div class="d" id="done-detail"></div>
      <button class="btn" id="again">다시 풀기</button>
    </div>
  </div>

  <div class="review">
    <h2 id="review-title">복습 대기</h2>
    <div class="misses" id="misses"><span class="empty">아직 없어요.</span></div>
  </div>
</div>

<script src="chapters.js"></script>
<script>
const $ = id => document.getElementById(id);
const shuffle = a => a.map(v => [Math.random(), v]).sort((x, y) => x[0] - y[0]).map(x => x[1]);

const chNo = new URLSearchParams(location.search).get("ch") || "1";
const chapter = CHAPTERS[chNo];
if (!chapter) {
  document.body.innerHTML = '<div class="wrap"><p class="lede">' + chNo + '장 데이터가 없습니다. <a href="index.html">목록으로</a></p></div>';
  throw new Error("no chapter " + chNo);
}
document.title = chapter.title + " · 단어 퀴즈";
$("title").textContent = chapter.title + " · " + chapter.subtitle;

// 한자가 없는 항목(조사, あなた 등)은 후리가나 개념이 없다 — 버튼을 잠근다
const ITEMS = chapter.items.map((it, i) => ({
  ...it,
  id: i,
  reading: it.seg.map(([t, r]) => r || t).join(""),
  hasRuby: it.seg.some(([, r]) => r),
}));

let sequential = false; // 교재에 적힌 차례대로 낼지, 섞어서 낼지
let showParts = false;  // 문제를 풀기 전에도 단어 분해를 보여줄지
let round = 0;          // 1주기 = 후리가나 표기, 2주기 = 한자만, 3주기~ = 복습
let queue = [];
let qIndex = 0;
let current = null;
let showFuri = true;    // 이번 문제에 후리가나가 보이는가
let peeked = false;     // 가려진 상태에서 사용자가 직접 열어봤는가
let locked = false;
let advanceTimer = null;   // 자동 넘김 타이머 — 새 문제를 낼 때 반드시 취소한다
let total = 0, hits = 0;
const pending = new Map();  // 다시 풀어야 하는 항목: id -> {item, wrong, peek}

/* ── 라운드 ─────────────────────────────── */
// 교재 순서 모드에서는 chapters.js에 적은 차례를 그대로 따른다 (id 오름차순 = 원본 순서)
const inOrder = list => [...list].sort((a, b) => a.id - b.id);
const arrange = list => (sequential ? inOrder(list) : shuffle(list));

function startRound(n) {
  round = n;
  qIndex = 0;
  queue = arrange(n <= 2 ? ITEMS : [...pending.values()].map(p => p.item));
  nextQuestion();
}

function roundLabel() {
  if (round === 1) return "1주기 · 히라가나 표기";
  if (round === 2) return "2주기 · 한자만";
  return "복습 " + (round - 2) + "회차";
}

function advance() {
  qIndex++;
  if (qIndex < queue.length) { nextQuestion(); return; }
  if (round === 1) { startRound(2); return; }
  // 2주기 이후로는 틀렸거나 훔쳐본 항목이 다 없어질 때까지 반복한다
  if (pending.size) { startRound(round + 1); return; }
  finish();
}

/* ── 문제 ───────────────────────────────── */
function nextQuestion() {
  clearTimeout(advanceTimer);   // 이전 문제의 타이머가 남아 있으면 다음 문제를 곧장 넘겨버린다
  current = queue[qIndex];
  locked = false;
  peeked = false;
  showFuri = (round === 1);

  renderWord();
  renderParts(false);
  $("tag").textContent = roundLabel() + " · " + (qIndex + 1) + "/" + queue.length;
  $("feedback").innerHTML = "";

  const btn = $("furi");
  btn.disabled = !current.hasRuby || round === 1;
  btn.classList.remove("peeked");
  btn.textContent = current.hasRuby
    ? (showFuri ? "히라가나 표기 중" : "히라가나 보기 (F)")
    : "한자 없음";

  const box = $("choices");
  box.innerHTML = "";
  makeChoices(current).forEach((c, i) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = '<span class="num">' + (i + 1) + '</span><span></span>';
    b.lastChild.textContent = c.ko;
    b.dataset.ko = c.ko;
    b.onclick = () => answer(c, b);
    box.appendChild(b);
  });
}

function renderWord() {
  const el = $("word");
  el.innerHTML = current.seg.map(([t, r]) =>
    r ? '<ruby>' + t + '<rt class="' + (showFuri ? "" : "off") + '">' + r + '</rt></ruby>' : t
  ).join("");
  el.classList.toggle("long", current.reading.length > 8);
}

/*
 * 단어 분해. 정답을 맞힌 뒤(reveal)에는 늘 보여주고, 문제를 푸는 중에는
 * "단어 설명"을 켜 둔 동안에만 보여준다 — 켜 두면 뜻이 먼저 보여 힌트가 되기 때문이다.
 */
function renderParts(reveal) {
  const box = $("parts");
  const parts = current.parts;
  if (!parts || !parts.length || !(showParts || reveal)) { box.hidden = true; return; }

  box.hidden = false;
  box.innerHTML = "";
  // 읽기가 하나도 없으면 그 열은 아예 만들지 않는다. 빈 칸을 자리만 잡아두면 뜻이 멀리 밀려난다.
  const hasReading = parts.some(p => p[1]);
  box.style.gridTemplateColumns = hasReading ? "auto auto 1fr" : "auto 1fr";

  for (const [surface, reading, meaning] of parts) {
    // .part 는 display:contents — 조각들이 바깥 격자에 직접 놓여야 행끼리 열이 맞는다
    const row = document.createElement("div");
    row.className = "part";
    row.appendChild(cell("s jp", surface));
    if (hasReading) row.appendChild(cell("rd jp", reading));
    row.appendChild(cell("mn", meaning));
    box.appendChild(row);
  }

  function cell(cls, text) {
    const el = document.createElement("span");
    el.className = cls;
    el.textContent = text;
    return el;
  }
}

function makeChoices(answerItem) {
  const others = shuffle(ITEMS.filter(x => x.ko !== answerItem.ko));
  return shuffle([answerItem, ...others.slice(0, 4)]);
}

function peek() {
  if (locked || showFuri || !current.hasRuby) return;
  showFuri = true;
  peeked = true;
  renderWord();
  const btn = $("furi");
  btn.disabled = true;
  btn.classList.add("peeked");
  btn.textContent = "봤으니 맞힐 때까지 반복";
}

function answer(choice, btn) {
  if (locked) return;
  locked = true;
  total++;

  const correct = choice.ko === current.ko;
  if (correct) hits++;
  if (!showFuri) { showFuri = true; renderWord(); }   // 정답 공개 시 읽는 법도 같이 보여준다
  $("furi").disabled = true;

  if (correct && !peeked) {
    pending.delete(current.id);
  } else {
    const p = pending.get(current.id) || { item: current, wrong: 0, peek: 0 };
    if (!correct) p.wrong++;
    if (peeked) p.peek++;
    pending.set(current.id, p);
  }

  for (const b of $("choices").children) {
    b.disabled = true;
    if (b.dataset.ko === current.ko) b.classList.add("correct");
    else if (b === btn) b.classList.add("wrong");
    else b.classList.add("dim");
  }

  const head = correct
    ? (peeked ? '<span class="hit">정답</span> — 다만 히라가나를 봤으니 한 번 더 나옵니다.'
              : '<span class="hit">정답!</span>')
    : '<span class="miss">아쉬워요.</span>';
  $("feedback").innerHTML = head + " " + current.reading + " = " + current.ko +
    (current.note ? '<span class="note">' + current.note + '</span>' : "");

  renderParts(true);
  renderScore();
  renderPending();
  advanceTimer = setTimeout(() => { if (locked) advance(); }, correct && !peeked ? 800 : 1900);
}

/* ── 표시 ───────────────────────────────── */
function renderScore() {
  const acc = total ? Math.round((hits / total) * 100) + "%" : "—";
  $("score").innerHTML = "<b>" + hits + "</b> / " + total + " · 정확도 <b>" + acc + "</b>";
}

function renderPending() {
  const box = $("misses");
  $("review-title").textContent = "복습 대기 " + (pending.size ? "(" + pending.size + ")" : "");
  if (!pending.size) { box.innerHTML = '<span class="empty">아직 없어요.</span>'; return; }
  box.innerHTML = "";
  for (const { item, wrong, peek } of [...pending.values()].sort((a, b) => (b.wrong + b.peek) - (a.wrong + a.peek))) {
    const el = document.createElement("div");
    el.className = "miss-item";
    const marks = [];
    if (wrong) marks.push("오답×" + wrong);
    if (peek) marks.push("훔쳐봄×" + peek);
    el.innerHTML = '<span class="k jp"></span><span class="r"></span><span class="c"></span>';
    el.children[0].textContent = item.seg.map(s => s[0]).join("");
    el.children[1].textContent = item.ko;
    el.children[2].textContent = marks.join(" ");
    box.appendChild(el);
  }
}

function finish() {
  $("quiz").hidden = true;
  $("done").hidden = false;
  $("done-detail").textContent =
    chapter.items.length + "개 항목을 " + round + "주기 만에 끝냈어요. " +
    "총 " + total + "문제 중 " + hits + "개 정답.";
}

/* ── 출제 순서 ──────────────────────────── */
function setOrder(seq) {
  sequential = seq;
  try { localStorage.setItem("chapterOrder", seq ? "seq" : "shuffle"); } catch {}
  $("order-seq").setAttribute("aria-pressed", seq);
  $("order-shuffle").setAttribute("aria-pressed", !seq);
  // 풀던 문제는 그대로 두고, 아직 안 나온 뒷부분만 새 순서로 다시 깐다
  if (queue.length) {
    queue = queue.slice(0, qIndex + 1).concat(arrange(queue.slice(qIndex + 1)));
  }
}

$("order-seq").onclick = () => setOrder(true);
$("order-shuffle").onclick = () => setOrder(false);

$("parts-toggle").onclick = () => {
  showParts = !showParts;
  try { localStorage.setItem("showParts", showParts ? "1" : "0"); } catch {}
  $("parts-toggle").setAttribute("aria-pressed", showParts);
  renderParts(locked);   // 이미 답한 문제라면 계속 보이게 둔다
};

$("furi").onclick = peek;
$("again").onclick = () => {
  $("quiz").hidden = false;
  $("done").hidden = true;
  total = 0; hits = 0;
  pending.clear();
  renderScore();
  renderPending();
  startRound(1);
};

document.addEventListener("keydown", e => {
  if (e.key >= "1" && e.key <= "5") {
    const b = $("choices").children[+e.key - 1];
    if (b && !b.disabled) b.click();
  } else if (e.key === "f" || e.key === "F") {
    peek();
  } else if (e.code === "Space") {
    e.preventDefault();
    if (locked) { locked = false; advance(); }   // 답하기 전엔 건너뛸 수 없다
  }
});

renderScore();
renderPending();
try {
  sequential = localStorage.getItem("chapterOrder") === "seq";
  showParts = localStorage.getItem("showParts") === "1";
} catch { /* 저장소가 막혀 있어도 기본값으로 돌아간다 */ }
$("order-seq").setAttribute("aria-pressed", sequential);
$("order-shuffle").setAttribute("aria-pressed", !sequential);
$("parts-toggle").setAttribute("aria-pressed", showParts);
startRound(1);
</script>
</body>
</html>
