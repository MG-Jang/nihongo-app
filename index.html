<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>일본어 공부</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#3b6ef5">
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</head>
<body>
<div class="wrap">
  <header>
    <h1>일본어 공부</h1>
  </header>

  <p class="lede">
    문제를 보고 5지선다로 답을 고르는 방식입니다.<br>
    장을 고르면 퀴즈와 듣기 트랙 중에 선택할 수 있어요.
  </p>

  <div class="menu" id="menu">
    <a class="entry" href="kana.html">
      <div class="t">가나 암기</div>
      <div class="d">히라가나 · 탁음 · 반탁음 · 요음 104자를 한글 발음으로 맞히기. 어려운 단계는 24자씩 3단계 + 최고 단계.</div>
    </a>
  </div>
</div>

<script src="chapters.js"></script>
<script>
// 장 목록은 chapters.js에서 만들어 낸다 — 새 장을 추가하면 여기 목록도 자동으로 늘어난다
const menu = document.getElementById("menu");
const nums = Object.keys(CHAPTERS).map(Number).sort((a, b) => a - b);

for (const n of nums) {
  const ch = CHAPTERS[n];
  const a = document.createElement("a");
  a.className = "entry";
  a.href = "ch.html?ch=" + n;
  a.innerHTML = '<div class="t"></div><div class="d"></div>';
  a.children[0].textContent = ch.title + " · " + ch.subtitle;
  a.children[1].textContent = "단어 " + ch.items.length + "개 · 퀴즈와 듣기 트랙";
  menu.appendChild(a);
}

// 다음 장 자리 표시 — chapters.js에 데이터가 들어오면 자동으로 진짜 항목이 된다
const soon = document.createElement("a");
soon.className = "entry soon";
soon.innerHTML = '<div class="t"></div><div class="d">아직 단어를 넣지 않았습니다.</div>';
soon.children[0].textContent = (nums[nums.length - 1] + 1) + "장";
menu.appendChild(soon);
</script>
</body>
</html>
